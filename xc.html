<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHANTOM CVE INTELLIGENCE PANEL v4.0</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap');

:root {
  --bg: #020408;
  --bg2: #040c14;
  --bg3: #061020;
  --panel: #061828;
  --panel2: #081e30;
  --border: #0a3a5a;
  --border2: #0d5080;
  --accent: #00d4ff;
  --accent2: #00ff88;
  --accent3: #ff3366;
  --accent4: #ffaa00;
  --accent5: #aa44ff;
  --text: #c0e8f8;
  --text2: #6aadcf;
  --text3: #3a7a9a;
  --dim: #1a4060;
  --glow: rgba(0,212,255,0.15);
  --glow2: rgba(0,255,136,0.1);
  --glow3: rgba(255,51,102,0.12);
  --red: #ff2244;
  --orange: #ff7700;
  --yellow: #ffdd00;
  --green: #00ff88;
  --blue: #00aaff;
  --purple: #aa44ff;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Share Tech Mono', monospace;
  min-height: 100vh;
  overflow-x: hidden;
}

/* SCANLINES */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
  pointer-events: none; z-index: 9999;
}

/* MATRIX BG */
#matrix-bg {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 0;
  opacity: 0.07;
}

/* HEADER */
header {
  position: relative; z-index: 10;
  background: linear-gradient(180deg, #000814 0%, var(--bg2) 100%);
  border-bottom: 2px solid var(--border2);
  padding: 12px 24px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 4px 40px rgba(0,180,255,0.15);
}

.logo {
  display: flex; align-items: center; gap: 16px;
}

.logo-icon {
  width: 48px; height: 48px;
  border: 2px solid var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  box-shadow: 0 0 20px var(--glow), inset 0 0 20px rgba(0,212,255,0.05);
  animation: pulse-border 2s ease-in-out infinite;
}

@keyframes pulse-border {
  0%,100% { box-shadow: 0 0 15px var(--glow); border-color: var(--accent); }
  50% { box-shadow: 0 0 35px rgba(0,212,255,0.4); border-color: #88eeff; }
}

.logo-text h1 {
  font-family: 'Orbitron', monospace;
  font-size: 20px; font-weight: 900;
  color: var(--accent);
  text-shadow: 0 0 20px rgba(0,212,255,0.5);
  letter-spacing: 3px;
}

.logo-text p {
  font-size: 10px; color: var(--text3);
  letter-spacing: 2px;
}

.header-stats {
  display: flex; gap: 20px; align-items: center;
}

.hstat {
  text-align: center;
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: rgba(0,212,255,0.03);
}

.hstat-val {
  font-family: 'Orbitron', monospace;
  font-size: 16px; font-weight: 700;
  color: var(--accent2);
  text-shadow: 0 0 10px rgba(0,255,136,0.3);
}

.hstat-lbl { font-size: 9px; color: var(--text3); letter-spacing: 1px; }

.header-live {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; color: var(--accent2);
}

.live-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent2);
  box-shadow: 0 0 8px var(--accent2);
  animation: blink 1s step-end infinite;
}

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* LAYOUT */
.app { position: relative; z-index: 5; display: flex; flex-direction: column; height: calc(100vh - 74px); }

/* TABS */
.tab-bar {
  display: flex; background: var(--bg2);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  scrollbar-width: none;
}

.tab-bar::-webkit-scrollbar { display: none; }

.tab {
  flex-shrink: 0;
  padding: 10px 20px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 12px; font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  white-space: nowrap;
  display: flex; align-items: center; gap: 6px;
}

.tab:hover { color: var(--text2); background: rgba(0,212,255,0.04); }
.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  background: rgba(0,212,255,0.06);
  text-shadow: 0 0 10px rgba(0,212,255,0.3);
}

.tab-badge {
  background: var(--accent3);
  color: #fff; font-size: 9px;
  padding: 1px 5px; border-radius: 10px;
  font-family: 'Share Tech Mono', monospace;
}

/* CONTENT */
.tab-content { display: none; flex: 1; overflow: hidden; }
.tab-content.active { display: flex; flex-direction: column; }

/* DASHBOARD */
.dashboard { padding: 16px; overflow-y: auto; flex: 1; }

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px; margin-bottom: 16px;
}

.stat-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 16px;
  position: relative; overflow: hidden;
  cursor: default;
  transition: all 0.2s;
}

.stat-card:hover { border-color: var(--border2); transform: translateY(-1px); }

.stat-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
}

.stat-card.critical::before { background: var(--red); box-shadow: 0 0 10px var(--red); }
.stat-card.high::before { background: var(--orange); box-shadow: 0 0 10px var(--orange); }
.stat-card.medium::before { background: var(--yellow); box-shadow: 0 0 10px var(--yellow); }
.stat-card.low::before { background: var(--green); box-shadow: 0 0 10px var(--green); }
.stat-card.info::before { background: var(--blue); box-shadow: 0 0 10px var(--blue); }
.stat-card.total::before { background: var(--purple); box-shadow: 0 0 10px var(--purple); }

.stat-val {
  font-family: 'Orbitron', monospace;
  font-size: 28px; font-weight: 900;
  line-height: 1;
}

.stat-card.critical .stat-val { color: var(--red); text-shadow: 0 0 15px rgba(255,34,68,0.4); }
.stat-card.high .stat-val { color: var(--orange); text-shadow: 0 0 15px rgba(255,119,0,0.4); }
.stat-card.medium .stat-val { color: var(--yellow); text-shadow: 0 0 15px rgba(255,221,0,0.4); }
.stat-card.low .stat-val { color: var(--green); text-shadow: 0 0 15px rgba(0,255,136,0.4); }
.stat-card.info .stat-val { color: var(--blue); text-shadow: 0 0 15px rgba(0,170,255,0.4); }
.stat-card.total .stat-val { color: var(--purple); text-shadow: 0 0 15px rgba(170,68,255,0.4); }

.stat-lbl { font-size: 10px; color: var(--text3); letter-spacing: 1px; margin-top: 4px; }

.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 16px; }

@media(max-width:768px) { .two-col,.three-col { grid-template-columns: 1fr; } }

.panel-box {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}

.panel-hdr {
  padding: 10px 16px;
  background: var(--panel2);
  border-bottom: 1px solid var(--border);
  font-family: 'Rajdhani', sans-serif;
  font-size: 12px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--accent);
  display: flex; align-items: center; justify-content: space-between;
}

.panel-hdr-icon { margin-right: 8px; }

/* FEED LIST */
.feed-list { overflow-y: auto; max-height: 280px; }

.feed-item {
  padding: 10px 16px;
  border-bottom: 1px solid rgba(10,58,90,0.4);
  display: flex; align-items: flex-start; gap: 10px;
  transition: background 0.2s;
  cursor: pointer;
}

.feed-item:hover { background: rgba(0,212,255,0.04); }

.feed-sev {
  flex-shrink: 0;
  font-size: 9px; font-weight: 700;
  padding: 2px 6px; border-radius: 3px;
  font-family: 'Orbitron', monospace;
  letter-spacing: 1px;
  margin-top: 2px;
}

.sev-CRITICAL { background: rgba(255,34,68,0.2); color: var(--red); border: 1px solid rgba(255,34,68,0.4); }
.sev-HIGH { background: rgba(255,119,0,0.2); color: var(--orange); border: 1px solid rgba(255,119,0,0.4); }
.sev-MEDIUM { background: rgba(255,221,0,0.2); color: var(--yellow); border: 1px solid rgba(255,221,0,0.4); }
.sev-LOW { background: rgba(0,255,136,0.2); color: var(--green); border: 1px solid rgba(0,255,136,0.4); }
.sev-INFO { background: rgba(0,170,255,0.2); color: var(--blue); border: 1px solid rgba(0,170,255,0.4); }

.feed-body { flex: 1; min-width: 0; }
.feed-id { font-family: 'Orbitron', monospace; font-size: 11px; color: var(--accent); }
.feed-desc { font-size: 11px; color: var(--text2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.feed-meta { font-size: 10px; color: var(--text3); margin-top: 2px; }

/* CVE SEARCH TAB */
.search-panel { padding: 16px; display: flex; flex-direction: column; gap: 12px; flex: 1; overflow: hidden; }

.search-bar {
  display: flex; gap: 8px;
}

.search-input {
  flex: 1;
  background: var(--panel2);
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 10px 14px;
  color: var(--text);
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  outline: none;
  transition: all 0.2s;
}

.search-input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--glow); }
.search-input::placeholder { color: var(--text3); }

.btn {
  padding: 10px 18px;
  border: 1px solid var(--border2);
  border-radius: 4px;
  background: rgba(0,212,255,0.08);
  color: var(--accent);
  font-family: 'Rajdhani', sans-serif;
  font-size: 12px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  display: flex; align-items: center; gap: 6px;
}

.btn:hover { background: rgba(0,212,255,0.15); border-color: var(--accent); box-shadow: 0 0 12px var(--glow); }
.btn:active { transform: scale(0.98); }

.btn-danger { border-color: rgba(255,51,102,0.4); color: var(--accent3); background: rgba(255,51,102,0.06); }
.btn-danger:hover { background: rgba(255,51,102,0.12); border-color: var(--accent3); box-shadow: 0 0 12px var(--glow3); }

.btn-success { border-color: rgba(0,255,136,0.4); color: var(--accent2); background: rgba(0,255,136,0.06); }
.btn-success:hover { background: rgba(0,255,136,0.12); border-color: var(--accent2); box-shadow: 0 0 12px var(--glow2); }

.btn-warn { border-color: rgba(255,170,0,0.4); color: var(--accent4); background: rgba(255,170,0,0.06); }
.btn-warn:hover { background: rgba(255,170,0,0.12); border-color: var(--accent4); }

.filter-row { display: flex; gap: 8px; flex-wrap: wrap; }

.filter-select {
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 6px 10px;
  color: var(--text2);
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  outline: none;
  cursor: pointer;
}

.filter-select:focus { border-color: var(--accent); }

/* CVE TABLE */
.cve-table-wrap { flex: 1; overflow: auto; border: 1px solid var(--border); border-radius: 6px; }

table.cve-table {
  width: 100%; border-collapse: collapse;
  font-size: 12px;
}

table.cve-table th {
  background: var(--panel2);
  color: var(--accent);
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border2);
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
}

table.cve-table th:hover { background: rgba(0,212,255,0.08); }

table.cve-table td {
  padding: 9px 12px;
  border-bottom: 1px solid rgba(10,58,90,0.35);
  vertical-align: middle;
}

table.cve-table tr:hover td { background: rgba(0,212,255,0.03); }

.cve-id-link {
  color: var(--accent);
  cursor: pointer;
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  text-decoration: none;
}

.cve-id-link:hover { text-shadow: 0 0 8px rgba(0,212,255,0.5); }

/* CVSS BAR */
.cvss-bar {
  display: flex; align-items: center; gap: 6px;
}

.cvss-track {
  flex: 1; height: 4px; background: var(--bg3);
  border-radius: 2px; overflow: hidden;
}

.cvss-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }

/* DETAIL MODAL */
.modal-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(4px);
  align-items: center; justify-content: center;
  padding: 16px;
}

.modal-overlay.open { display: flex; }

.modal {
  background: var(--panel);
  border: 1px solid var(--border2);
  border-radius: 8px;
  width: 100%; max-width: 760px;
  max-height: 90vh;
  overflow: hidden;
  display: flex; flex-direction: column;
  box-shadow: 0 0 60px rgba(0,212,255,0.15);
}

.modal-hdr {
  padding: 14px 20px;
  background: var(--panel2);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}

.modal-hdr-title {
  font-family: 'Orbitron', monospace;
  font-size: 14px; color: var(--accent);
}

.modal-close {
  cursor: pointer; color: var(--text3); font-size: 20px;
  padding: 2px 8px; border-radius: 4px;
  transition: all 0.2s;
  background: none; border: none;
}

.modal-close:hover { color: var(--accent3); background: rgba(255,51,102,0.1); }

.modal-body { padding: 20px; overflow-y: auto; flex: 1; }

.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }

.detail-field { background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 10px 14px; }
.detail-field label { font-size: 10px; color: var(--text3); letter-spacing: 1px; display: block; margin-bottom: 4px; }
.detail-field .val { font-size: 13px; color: var(--text); }

.desc-box {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 12px 14px;
  font-size: 12px;
  color: var(--text2);
  line-height: 1.6;
  margin-bottom: 12px;
}

/* EXPLOIT / TEST SECTION */
.exploit-box {
  background: var(--bg3);
  border: 1px solid rgba(255,51,102,0.3);
  border-radius: 4px;
  padding: 12px 14px;
  margin-bottom: 12px;
}

.exploit-box h4 {
  font-family: 'Rajdhani', sans-serif;
  font-size: 12px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--accent3);
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
}

.terminal {
  background: #000;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 12px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  color: var(--accent2);
  overflow-x: auto;
  position: relative;
}

.terminal .prompt { color: var(--text3); }
.terminal .cmd { color: var(--accent2); }
.terminal .output { color: var(--text2); }
.terminal .err { color: var(--accent3); }

/* TEST TERMINAL TAB */
.terminal-tab { display: flex; flex-direction: column; flex: 1; overflow: hidden; padding: 16px; gap: 12px; }

.term-top { display: flex; gap: 8px; }

.term-target {
  flex: 1;
  background: var(--panel2);
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 10px 14px;
  color: var(--text);
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px; outline: none;
}

.term-target:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--glow); }

.term-output {
  flex: 1;
  background: #000a12;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 16px;
  overflow-y: auto;
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  line-height: 1.7;
}

.term-line { margin-bottom: 2px; }
.tc-prompt { color: #555; }
.tc-cmd { color: var(--accent2); }
.tc-out { color: var(--text2); }
.tc-err { color: var(--accent3); }
.tc-success { color: var(--accent2); }
.tc-info { color: var(--accent); }
.tc-warn { color: var(--accent4); }
.tc-data { color: #aa88ff; }
.tc-vuln { color: var(--red); font-weight: bold; }
.tc-safe { color: var(--green); }

.term-input-row {
  display: flex; gap: 8px; align-items: center;
  background: var(--panel2);
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 8px 12px;
}

.term-prompt-sym { color: var(--accent2); font-size: 14px; }

.term-cmd-input {
  flex: 1;
  background: none;
  border: none;
  color: var(--accent2);
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  outline: none;
}

/* CATEGORIES TAB */
.categories-tab { padding: 16px; overflow-y: auto; flex: 1; }

.cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }

.cat-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 14px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative; overflow: hidden;
}

.cat-card::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0; height: 2px;
}

.cat-card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,212,255,0.08); }

.cat-icon { font-size: 28px; margin-bottom: 8px; }
.cat-name { font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 700; color: var(--text); letter-spacing: 1px; }
.cat-count { font-family: 'Orbitron', monospace; font-size: 20px; font-weight: 900; margin-top: 4px; }
.cat-desc { font-size: 10px; color: var(--text3); margin-top: 6px; line-height: 1.5; }
.cat-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
.cat-tag { font-size: 9px; padding: 2px 6px; border-radius: 10px; background: rgba(0,212,255,0.06); border: 1px solid var(--border); color: var(--text3); }

/* SOURCES TAB */
.sources-tab { padding: 16px; overflow-y: auto; flex: 1; }

.source-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }

.source-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 16px;
  transition: all 0.2s;
}

.source-card:hover { border-color: var(--border2); }

.source-hdr { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.source-icon { font-size: 24px; }
.source-name { font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 700; color: var(--text); }
.source-org { font-size: 10px; color: var(--text3); }
.source-status { margin-left: auto; }
.status-dot-on { color: var(--green); font-size: 10px; }
.status-dot-off { color: var(--red); font-size: 10px; }

.source-desc { font-size: 11px; color: var(--text2); line-height: 1.5; margin-bottom: 10px; }
.source-url { font-size: 10px; color: var(--accent); cursor: pointer; }
.source-url:hover { text-decoration: underline; }

.source-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.source-tag { font-size: 9px; padding: 2px 7px; border-radius: 10px; border: 1px solid var(--border); color: var(--text3); }

.source-actions { display: flex; gap: 6px; margin-top: 10px; }
.sbtn {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px; padding: 4px 10px;
  border-radius: 3px; border: 1px solid var(--border); cursor: pointer;
  background: rgba(0,212,255,0.05); color: var(--text2);
  transition: all 0.2s;
}
.sbtn:hover { border-color: var(--accent); color: var(--accent); }
.sbtn.active { border-color: var(--accent2); color: var(--accent2); background: rgba(0,255,136,0.08); }

/* HELP TAB */
.help-tab { padding: 20px; overflow-y: auto; flex: 1; }

.help-section { margin-bottom: 24px; }
.help-section h2 {
  font-family: 'Orbitron', monospace;
  font-size: 14px; color: var(--accent);
  border-bottom: 1px solid var(--border2);
  padding-bottom: 8px; margin-bottom: 12px;
  letter-spacing: 2px;
}

.help-section h3 {
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px; color: var(--text);
  margin: 12px 0 6px; letter-spacing: 1px;
}
